<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关系图谱</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1e1e2e;
    color: #dcddde;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
  .graph-container { width: 100%; height: 100%; position: relative; }
  .graph-container svg { width: 100%; height: 100%; display: block; }

  .tooltip {
    position: absolute;
    background: #2a2a2a;
    border: 1px solid #404040;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 11px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    white-space: nowrap;
    color: #dcddde;
  }
  .tooltip.visible { opacity: 1; }

  .node-label {
    fill: #b8b8b8;
    font-size: 10px;
    font-weight: 400;
    pointer-events: none;
    text-anchor: start;
    dominant-baseline: central;
  }

  .link-line {
    stroke: #777;
    stroke-opacity: 0.25;
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    font-size: 13px;
    color: #666;
  }

  .controls {
    position: absolute;
    top: 8px;
    right: 12px;
    display: flex;
    gap: 2px;
    z-index: 10;
  }
  .zoom-btn {
    background: rgba(50, 50, 50, 0.7);
    border: 1px solid #555;
    color: #999;
    width: 26px;
    height: 26px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
  }
  .zoom-btn:hover { background: #444; color: #ccc; }
</style>
</head>
<body>

<div class="graph-container" id="graphContainer">
  <div class="loading" id="loading">加载中...</div>
  <div class="controls">
    <button class="zoom-btn" id="zoomIn">+</button>
    <button class="zoom-btn" id="zoomOut">-</button>
    <button class="zoom-btn" id="zoomFit">&#8982;</button>
  </div>
  <div class="tooltip" id="tooltip"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
(function() {
  // Muted pastel colors like Obsidian's default palette
  var CATEGORY_COLORS = {
    '3dgs': '#e57373',
    'avm': '#ffb74d',
    'calibration': '#fff176',
    'perception': '#81c784',
    'tracking': '#64b5f6',
    'fusion': '#ba68c8',
    'platform': '#4db6ac',
    'tools': '#f06292',
    'general': '#999'
  };

  var container = document.getElementById('graphContainer');
  var tooltip = document.getElementById('tooltip');
  var loadingEl = document.getElementById('loading');

  var width, height;
  var svg, g, zoom;
  var link, node;
  var graphData = { nodes: [], edges: [] };
  var adjacencyMap = {};

  function init() {
    width = container.clientWidth;
    height = container.clientHeight;

    svg = d3.select('#graphContainer')
      .append('svg')
      .attr('width', width)
      .attr('height', height);

    g = svg.append('g');

    zoom = d3.zoom()
      .scaleExtent([0.1, 6])
      .on('zoom', function(event) {
        g.attr('transform', event.transform);
      });

    svg.call(zoom);

    document.getElementById('zoomIn').onclick = function() {
      svg.transition().duration(200).call(zoom.scaleBy, 1.5);
    };
    document.getElementById('zoomOut').onclick = function() {
      svg.transition().duration(200).call(zoom.scaleBy, 0.65);
    };
    document.getElementById('zoomFit').onclick = fitView;
  }

  function fitView() {
    if (!node || node.empty()) return;
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    node.each(function(d) {
      if (d.x - d.r < minX) minX = d.x - d.r;
      if (d.y - d.r < minY) minY = d.y - d.r;
      if (d.x + d.r > maxX) maxX = d.x + d.r;
      if (d.y + d.r > maxY) maxY = d.y + d.r;
      var lw = estimateLabelWidth(d.id);
      if (d.labelX - lw / 2 < minX) minX = d.labelX - lw / 2;
      if (d.labelX + lw / 2 > maxX) maxX = d.labelX + lw / 2;
      if (d.labelY - 7 < minY) minY = d.labelY - 7;
      if (d.labelY + 7 > maxY) maxY = d.labelY + 7;
    });
    var pad = 80;
    var bw = maxX - minX || 1;
    var bh = maxY - minY || 1;
    var scale = Math.min(
      (width - pad * 2) / bw,
      (height - pad * 2) / bh,
      1.8
    );
    var tx = width / 2 - (minX + bw / 2) * scale;
    var ty = height / 2 - (minY + bh / 2) * scale;
    svg.transition().duration(600).call(
      zoom.transform,
      d3.zoomIdentity.translate(tx, ty).scale(scale)
    );
  }

  function loadGraphData() {
    fetch('/api/graph')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        graphData = data;
        loadingEl.style.display = 'none';
        renderGraph();
      })
      .catch(function(err) {
        loadingEl.textContent = '加载失败: ' + err.message;
      });
  }

  function buildAdjacency(nodes, edges) {
    var adj = {};
    nodes.forEach(function(n) { adj[n.key] = new Set(); });
    edges.forEach(function(e) {
      var sk = typeof e.source === 'object' ? e.source.key : e.source;
      var tk = typeof e.target === 'object' ? e.target.key : e.target;
      adj[sk].add(tk);
      adj[tk].add(sk);
    });
    return adj;
  }

  function estimateLabelWidth(text) {
    return (text || '').length * 6 + 2;
  }

  function resolveLabelCollisions(nodes, iterations) {
    var labelBounds = nodes.map(function(n) {
      var w = estimateLabelWidth(n.id);
      return { x: n.labelX, y: n.labelY, w: w, h: 12 };
    });

    for (var iter = 0; iter < iterations; iter++) {
      var moved = false;
      for (var i = 0; i < nodes.length; i++) {
        for (var j = i + 1; j < nodes.length; j++) {
          var a = labelBounds[i];
          var b = labelBounds[j];
          var pad = 3;
          if (a.x - pad < b.x + b.w + pad && a.x + a.w + pad > b.x - pad &&
              a.y - pad < b.y + b.h + pad && a.y + a.h + pad > b.y - pad) {
            var overlapX = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
            var overlapY = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);
            if (overlapY < overlapX * 0.5) {
              var dy = (a.y <= b.y) ? -1 : 1;
              a.y += dy * (overlapY * 0.5 + 1.5);
              b.y -= dy * (overlapY * 0.5 + 1.5);
            } else {
              var dx = (a.x <= b.x) ? -1 : 1;
              a.x += dx * (overlapX * 0.5 + 1.5);
              b.x -= dx * (overlapX * 0.5 + 1.5);
            }
            moved = true;
          }
        }
      }
      if (!moved) break;
    }

    for (var k = 0; k < nodes.length; k++) {
      nodes[k].labelX = labelBounds[k].x;
      nodes[k].labelY = labelBounds[k].y;
    }
  }

  function renderGraph() {
    var nodes = graphData.nodes;
    var edges = graphData.edges;

    g.selectAll('*').remove();

    if (nodes.length === 0) return;

    var cx = width / 2;
    var cy = height / 2;

    // Calculate degrees
    var degrees = {};
    nodes.forEach(function(n) { degrees[n.key] = 0; });
    edges.forEach(function(e) {
      degrees[e.source] = (degrees[e.source] || 0) + 1;
      degrees[e.target] = (degrees[e.target] || 0) + 1;
    });

    // Small uniform nodes: 4-6px
    var maxDeg = Math.max(1, d3.max(Object.values(degrees)));
    nodes.forEach(function(n) {
      var deg = degrees[n.key] || 0;
      n.r = 4 + 2 * Math.pow(deg / maxDeg, 0.8);
      n.degree = deg;
    });

    // Start near center
    nodes.forEach(function(n) {
      n.x = cx + (Math.random() - 0.5) * 20;
      n.y = cy + (Math.random() - 0.5) * 20;
    });

    // Resolve edges
    var nodeMap = {};
    nodes.forEach(function(n) { nodeMap[n.key] = n; });
    var resolvedEdges = edges.map(function(e) {
      return {
        source: nodeMap[e.source] || { x: cx, y: cy },
        target: nodeMap[e.target] || { x: cx, y: cy }
      };
    });

    // === FORCE SIMULATION ===
    var sim = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(resolvedEdges)
        .id(function(d) { return d.key; })
        .distance(45)
        .strength(0.25))
      .force('charge', d3.forceManyBody().strength(-50))
      .force('center', d3.forceCenter(cx, cy).strength(0.05))
      .alphaDecay(0.02)
      .velocityDecay(0.5);

    // Pre-simulate
    sim.alpha(1).restart();
    for (var i = 0; i < 500; i++) sim.tick();
    sim.stop();

    // === LABELS: right of node ===
    nodes.forEach(function(n) {
      n.labelX = n.x + n.r + 5;
      n.labelY = n.y;
    });
    resolveLabelCollisions(nodes, 120);

    // === RENDER LINKS (below nodes) ===
    link = g.append('g')
      .selectAll('line')
      .data(resolvedEdges)
      .join('line')
      .attr('class', 'link-line')
      .attr('stroke-width', 0.5)
      .attr('x1', function(d) { return d.source.x; })
      .attr('y1', function(d) { return d.source.y; })
      .attr('x2', function(d) { return d.target.x; })
      .attr('y2', function(d) { return d.target.y; });

    // === RENDER NODES ===
    var nodeGroup = g.append('g')
      .selectAll('g')
      .data(nodes)
      .join('g')
      .attr('class', 'node-group')
      .style('cursor', 'pointer')
      .attr('transform', function(d) {
        return 'translate(' + d.x + ',' + d.y + ')';
      });

    nodeGroup.append('circle')
      .attr('class', 'node-circle')
      .attr('r', function(d) { return d.r; })
      .attr('fill', function(d) {
        return CATEGORY_COLORS[d.category || 'general'] || '#888';
      });

    // Labels
    nodeGroup.append('text')
      .attr('class', 'node-label')
      .attr('x', function(d) { return d.labelX - d.x; })
      .attr('y', function(d) { return d.labelY - d.y; })
      .text(function(d) { return d.id; });

    node = nodeGroup;

    // Build adjacency
    adjacencyMap = buildAdjacency(nodes, resolvedEdges);

    // === INTERACTIONS ===
    nodeGroup
      .on('mouseover', function(event, d) {
        event.stopPropagation();
        var color = CATEGORY_COLORS[d.category || 'general'] || '#888';
        var connected = adjacencyMap[d.key] || new Set();
        connected.add(d.key);

        nodeGroup.transition().duration(60)
          .style('opacity', function(n) { return connected.has(n.key) ? 1 : 0.05; });
        link.transition().duration(60)
          .style('opacity', function(l) {
            return (l.source.key === d.key || l.target.key === d.key) ? 0.5 : 0.01;
          })
          .attr('stroke', function(l) {
            return (l.source.key === d.key || l.target.key === d.key) ? color : '#555';
          });

        d3.select(this).select('.node-circle')
          .transition().duration(60)
          .attr('r', d.r + 2.5);
        d3.select(this).select('.node-label')
          .transition().duration(60)
          .attr('fill', '#fff');

        tooltip.textContent = d.id;
        tooltip.classList.add('visible');
        moveTooltip(event);
      })
      .on('mousemove', function(event) {
        event.stopPropagation();
        moveTooltip(event);
      })
      .on('mouseout', function(event) {
        event.stopPropagation();

        nodeGroup.transition().duration(100).style('opacity', 1);
        link.transition().duration(100)
          .style('opacity', 0.15)
          .attr('stroke', '#555');

        nodeGroup.select('.node-circle')
          .transition().duration(100)
          .attr('r', function(d) { return d.r; });
        nodeGroup.select('.node-label')
          .transition().duration(100)
          .attr('fill', '#b0b0b0');

        tooltip.classList.remove('visible');
      })
      .on('click', function(event, d) {
        event.stopPropagation();
        window.location.href = '/#/wiki/' + d.key;
      });

    // Drag
    nodeGroup.call(d3.drag()
      .on('start', function(event, d) {
        event.sourceEvent.stopPropagation();
        if (!event.active) sim.alphaTarget(0.1).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', function(event, d) {
        event.sourceEvent.stopPropagation();
        d.fx = event.x; d.fy = event.y;
      })
      .on('end', function(event, d) {
        if (!event.active) sim.alphaTarget(0);
        d.fx = null; d.fy = null;
      }));

    setTimeout(fitView, 50);
  }

  function moveTooltip(event) {
    var rect = container.getBoundingClientRect();
    var x = event.clientX - rect.left + 12;
    var y = event.clientY - rect.top - 8;
    var tw = tooltip.offsetWidth;
    var th = tooltip.offsetHeight;
    if (x + tw > rect.width - 8) x = event.clientX - rect.left - tw - 12;
    if (y + th > rect.height - 8) y = rect.height - th - 8;
    if (y < 8) y = 8;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }

  window.addEventListener('resize', function() {
    width = container.clientWidth;
    height = container.clientHeight;
    svg.attr('width', width).attr('height', height);
  });

  init();
  loadGraphData();
})();
</script>
</body>
</html>
